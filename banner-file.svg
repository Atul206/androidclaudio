  <rect x="875" y="96" width="48" height="7" rx="3.5" fill="#070E1C"/>
  <!-- Front camera dot -->
  <circle cx="912" cy="99.5" r="2.5" fill="#0D1B30"/>
  <!-- Side button right -->
  <rect x="968" y="148" width="4" height="36" rx="2" fill="#0F1E38"/>
  <!-- Volume buttons left -->
  <rect x="826" y="138" width="4" height="24" rx="2" fill="#0F1E38"/>
  <rect x="826" y="170" width="4" height="24" rx="2" fill="#0F1E38"/>

  <!-- ---- SCREEN CONTENT ---- -->
  <!-- Top bar: connection status -->
  <rect x="850" y="116" width="98" height="18" rx="4" fill="#0E2041" stroke="#1D4480" stroke-width="0.5"/>
  <circle cx="860" cy="125" r="3.5" fill="#10B981"/>
  <text x="868" y="129" font-family="monospace" font-size="8.5" fill="#60A5FA">MCP Connected</text>

  <!-- Code lines (simulating terminal/IDE) -->
  <rect x="851" y="142" width="72" height="5" rx="2" fill="#102040"/>
  <rect x="851" y="152" width="55" height="5" rx="2" fill="#0F2A1E"/>
  <rect x="851" y="162" width="84" height="5" rx="2" fill="#1A1040"/>
  <rect x="851" y="172" width="48" height="5" rx="2" fill="#102040"/>
  <rect x="851" y="182" width="68" height="5" rx="2" fill="#0F2A1E"/>

  <!-- Separator -->
  <line x1="851" y1="194" x2="942" y2="194" stroke="#152035" stroke-width="0.5"/>

  <!-- AI response block -->
  <rect x="851" y="200" width="92" height="44" rx="5" fill="#0A1F3D" stroke="#1D4480" stroke-width="0.5"/>
  <text x="858" y="214" font-family="monospace" font-size="8" fill="#34D399">✓ 3 classes found</text>
  <text x="858" y="226" font-family="monospace" font-size="8" fill="#60A5FA">✓ Flow verified</text>
  <text x="858" y="238" font-family="monospace" font-size="8" fill="#A5B4FC">✓ Mocks applied</text>

  <!-- Live badge -->
  <rect x="851" y="252" width="44" height="16" rx="4" fill="#052814" stroke="#065F46" stroke-width="0.5"/>
  <circle cx="861" cy="260" r="2.5" fill="#10B981"/>
  <text x="866" y="264" font-family="monospace" font-size="8" fill="#34D399">LIVE</text>

  <!-- Test progress bar -->
  <rect x="851" y="277" width="92" height="6" rx="3" fill="#0D1B30"/>
  <rect x="851" y="277" width="68" height="6" rx="3" fill="#10B981" opacity="0.7"/>
  <text x="851" y="295" font-family="monospace" font-size="7.5" fill="#334155">74% flows passing</text>

  <!-- ---- FLOATING NODES ---- -->

  <!-- TOP NODE: Claude Code -->
  <rect x="826" y="18" width="146" height="44" rx="9" fill="#0A1628" stroke="#3730A3" stroke-width="1"/>
  <text x="899" y="36" font-family="'SF Pro Text', Arial, sans-serif" font-size="12" font-weight="600" fill="#818CF8" text-anchor="middle">Claude Code</text>
  <text x="899" y="52" font-family="monospace" font-size="9" fill="#3730A3" text-anchor="middle">AI orchestrator</text>
  <!-- Connector line: top node → phone top -->
  <line x1="899" y1="62" x2="899" y2="86" stroke="#4F46E5" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
  <polygon points="894,82 904,82 899,88" fill="#4F46E5" opacity="0.8"/>

  <!-- LEFT NODE: MCP Server -->
  <rect x="665" y="178" width="138" height="56" rx="9" fill="#0A1628" stroke="#065F46" stroke-width="1"/>
  <text x="734" y="200" font-family="'SF Pro Text', Arial, sans-serif" font-size="12" font-weight="600" fill="#34D399" text-anchor="middle">MCP Server</text>
  <text x="734" y="215" font-family="monospace" font-size="9" fill="#064E3B" text-anchor="middle">embedded in APK</text>
  <circle cx="734" cy="226" r="3" fill="#10B981" opacity="0.6"/>
  <text x="742" y="230" font-family="monospace" font-size="8" fill="#064E3B">active</text>
  <!-- Connector: left node → phone left -->
  <line x1="803" y1="206" x2="830" y2="206" stroke="#059669" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
  <polygon points="826,201 826,211 832,206" fill="#059669" opacity="0.8"/>

  <!-- RIGHT NODE: Debug APK -->
  <rect x="996" y="178" width="138" height="56" rx="9" fill="#0A1628" stroke="#92400E" stroke-width="1"/>
  <text x="1065" y="200" font-family="'SF Pro Text', Arial, sans-serif" font-size="12" font-weight="600" fill="#FB923C" text-anchor="middle">Debug APK</text>
  <text x="1065" y="215" font-family="monospace" font-size="9" fill="#92400E" text-anchor="middle">emulator / device</text>
  <circle cx="1055" cy="226" r="3" fill="#F59E0B" opacity="0.6"/>
  <text x="1063" y="230" font-family="monospace" font-size="8" fill="#92400E">ready</text>
  <!-- Connector: phone right → right node -->
  <line x1="968" y1="206" x2="996" y2="206" stroke="#EA580C" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
  <polygon points="992,201 992,211 998,206" fill="#EA580C" opacity="0.8"/>

  <!-- BOTTOM NODE: Feature Flows -->
  <rect x="826" y="348" width="146" height="40" rx="9" fill="#0A1628" stroke="#1E3A5F" stroke-width="1"/>
  <text x="899" y="365" font-family="'SF Pro Text', Arial, sans-serif" font-size="12" font-weight="600" fill="#60A5FA" text-anchor="middle">Feature Flows</text>
  <text x="899" y="380" font-family="monospace" font-size="9" fill="#1E3A5F" text-anchor="middle">AI verification engine</text>
  <!-- Connector: phone bottom → bottom node -->
  <line x1="899" y1="328" x2="899" y2="348" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
  <polygon points="894,344 904,344 899,350" fill="#3B82F6" opacity="0.8"/>

  <!-- Decorative corner dots top-right -->
  <circle cx="1148" cy="32" r="2.5" fill="#1E2D45"/>
  <circle cx="1162" cy="32" r="2.5" fill="#1E2D45"/>
  <circle cx="1176" cy="32" r="2.5" fill="#1E2D45"/>
  <circle cx="1148" cy="46" r="2.5" fill="#1E2D45"/>
  <circle cx="1162" cy="46" r="2.5" fill="#1E2D45"/>
  <circle cx="1176" cy="46" r="2.5" fill="#1E2D45"/>

  <!-- Top-right corner ticks -->
  <line x1="1156" y1="18" x2="1186" y2="18" stroke="#059669" stroke-width="1.5"/>
  <line x1="1186" y1="18" x2="1186" y2="48" stroke="#059669" stroke-width="1.5"/>

  <!-- Bottom-right corner ticks -->
  <line x1="1156" y1="402" x2="1186" y2="402" stroke="#4F46E5" stroke-width="1.5"/>
