<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <title>AndroidClaudio — Claude Code × MCP × Android Testing</title>

  <defs>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#1E2D45" opacity="0.9"/>
    </pattern>
    <linearGradient id="purpleGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tealGlow" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="phoneScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1E3D"/>
      <stop offset="100%" stop-color="#060D1C"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="420" fill="#060C18"/>

  <!-- Dot grid texture -->
  <rect width="1200" height="420" fill="url(#dots)"/>

  <!-- Ambient glows -->
  <ellipse cx="100" cy="210" rx="320" ry="280" fill="url(#purpleGlow)"/>
  <ellipse cx="1100" cy="280" rx="280" ry="240" fill="url(#tealGlow)"/>

  <!-- Horizontal accent lines top -->
  <line x1="60" y1="44" x2="580" y2="44" stroke="#1A2D4A" stroke-width="0.5"/>
  <line x1="60" y1="376" x2="580" y2="376" stroke="#1A2D4A" stroke-width="0.5"/>

  <!-- Left panel vertical accent -->
  <line x1="44" y1="44" x2="44" y2="376" stroke="#1A2D4A" stroke-width="0.5"/>

  <!-- Corner ticks -->
  <line x1="44" y1="44" x2="60" y2="44" stroke="#4F46E5" stroke-width="1.5"/>
  <line x1="44" y1="44" x2="44" y2="60" stroke="#4F46E5" stroke-width="1.5"/>
  <line x1="44" y1="376" x2="60" y2="376" stroke="#059669" stroke-width="1.5"/>
  <line x1="44" y1="376" x2="44" y2="360" stroke="#059669" stroke-width="1.5"/>

  <!-- ============================================================ -->
  <!-- LEFT TEXT SECTION                                             -->
  <!-- ============================================================ -->

  <!-- Eyebrow label -->
  <rect x="72" y="56" width="156" height="22" rx="11" fill="#0D1730" stroke="#1D3461" stroke-width="0.5"/>
  <text x="80" y="71" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#4F7CAC" letter-spacing="1.5">CLAUDE CODE × MCP</text>

  <!-- Main title: Android in green, Claudio in indigo -->
  <text x="72" y="148" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="82" font-weight="800" letter-spacing="-3">
    <tspan fill="#34D399">Android</tspan><tspan fill="#818CF8">Claudio</tspan>
  </text>

  <!-- Tagline -->
  <text x="74" y="178" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="17" fill="#64748B" letter-spacing="0.2">
    AI-powered live testing for Android — direct from Claude Code
  </text>

  <!-- Thin separator -->
  <line x1="72" y1="200" x2="555" y2="200" stroke="#162035" stroke-width="0.5"/>

  <!-- Feature pills row -->
  <!-- Pill: MCP Server -->
  <rect x="72" y="214" width="116" height="26" rx="13" fill="#0A1628" stroke="#1D3D8C" stroke-width="0.75"/>
  <circle cx="88" cy="227" r="4" fill="#3B82F6" opacity="0.8"/>
  <text x="100" y="232" font-family="'SF Mono', monospace" font-size="11" fill="#60A5FA">MCP Server</text>

  <!-- Pill: Class Discovery -->
  <rect x="200" y="214" width="148" height="26" rx="13" fill="#091A14" stroke="#065F46" stroke-width="0.75"/>
  <circle cx="216" cy="227" r="4" fill="#10B981" opacity="0.8"/>
  <text x="228" y="232" font-family="'SF Mono', monospace" font-size="11" fill="#34D399">Class Discovery</text>

  <!-- Pill: AI Mocks -->
  <rect x="360" y="214" width="136" height="26" rx="13" fill="#100B2A" stroke="#3730A3" stroke-width="0.75"/>
  <circle cx="376" cy="227" r="4" fill="#818CF8" opacity="0.8"/>
  <text x="388" y="232" font-family="'SF Mono', monospace" font-size="11" fill="#A5B4FC">Intelligent Mocks</text>

  <!-- Feature list -->
  <text x="74" y="272" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#475569">
    <tspan fill="#34D399">▸</tspan>
    <tspan dx="6" fill="#94A3B8">Discovers classes &amp; public functions in debug APK</tspan>
  </text>
  <text x="74" y="298" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#475569">
    <tspan fill="#818CF8">▸</tspan>
    <tspan dx="6" fill="#94A3B8">Calls live functions directly on emulator via MCP</tspan>
  </text>
  <text x="74" y="324" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#475569">
    <tspan fill="#60A5FA">▸</tspan>
    <tspan dx="6" fill="#94A3B8">Verifies full feature flows with AI mock responses</tspan>
  </text>
  <text x="74" y="350" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#475569">
    <tspan fill="#FB923C">▸</tspan>
    <tspan dx="6" fill="#94A3B8">Flip groups to live mode for real API testing</tspan>
  </text>

  <!-- Version / stack badge bottom-left -->
  <rect x="72" y="388" width="232" height="22" rx="5" fill="#0B1423" stroke="#1E2D45" stroke-width="0.5"/>
  <text x="80" y="403" font-family="'SF Mono', monospace" font-size="10" fill="#334155" letter-spacing="0.8">kotlin · compose · ktor · claude-sdk</text>

  <!-- ============================================================ -->
  <!-- RIGHT VISUAL SECTION  (x: 640–1160)                          -->
  <!-- ============================================================ -->

  <!-- Vertical divider -->
  <line x1="628" y1="60" x2="628" y2="360" stroke="#111D30" stroke-width="0.5" stroke-dasharray="6,5"/>

